<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>学生信息管理系统</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header>
    <div class="header-content">
      <h1>🎓 学生信息管理系统</h1>
      <p>Student Information Management System</p>
    </div>
  </header>

  <main>
    <!-- Stats Bar -->
    <section class="stats-bar">
      <div class="stat-card">
        <span class="stat-num" id="totalCount">0</span>
        <span class="stat-label">学生总数</span>
      </div>
      <div class="stat-card">
        <span class="stat-num" id="maleCount">0</span>
        <span class="stat-label">男生</span>
      </div>
      <div class="stat-card">
        <span class="stat-num" id="femaleCount">0</span>
        <span class="stat-label">女生</span>
      </div>
      <div class="stat-card">
        <span class="stat-num" id="majorCount">0</span>
        <span class="stat-label">专业数</span>
      </div>
    </section>

    <!-- Toolbar -->
    <section class="toolbar">
      <div class="search-box">
        <input
          type="text"
          id="searchInput"
          placeholder="🔍 搜索姓名或学号..."
          aria-label="搜索"
        />
        <button id="searchBtn" class="btn btn-secondary">搜索</button>
        <button id="clearBtn" class="btn btn-ghost">清除</button>
      </div>
      <button id="addBtn" class="btn btn-primary">➕ 新增学生</button>
    </section>

    <!-- Student Table -->
    <section class="table-section">
      <div class="table-wrapper">
        <table id="studentTable">
          <thead>
            <tr>
              <th>#</th>
              <th>学号</th>
              <th>姓名</th>
              <th>性别</th>
              <th>专业</th>
              <th>年级</th>
              <th>邮箱</th>
              <th>电话</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr>
              <td colspan="9" class="loading">加载中...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <!-- Modal -->
  <div id="modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-overlay" id="modalOverlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">新增学生</h2>
        <button class="modal-close" id="modalClose" aria-label="关闭">&times;</button>
      </div>
      <form id="studentForm" novalidate>
        <input type="hidden" id="studentDbId" />
        <div class="form-grid">
          <div class="form-group">
            <label for="inputName">姓名 <span class="required">*</span></label>
            <input type="text" id="inputName" placeholder="请输入姓名" required />
          </div>
          <div class="form-group">
            <label for="inputStudentId">学号 <span class="required">*</span></label>
            <input type="text" id="inputStudentId" placeholder="请输入学号" required />
          </div>
          <div class="form-group">
            <label for="inputGender">性别</label>
            <select id="inputGender">
              <option value="">请选择</option>
              <option value="男">男</option>
              <option value="女">女</option>
            </select>
          </div>
          <div class="form-group">
            <label for="inputGrade">年级</label>
            <input type="text" id="inputGrade" placeholder="如: 2021" />
          </div>
          <div class="form-group form-group-full">
            <label for="inputMajor">专业</label>
            <input type="text" id="inputMajor" placeholder="请输入专业名称" />
          </div>
          <div class="form-group">
            <label for="inputEmail">邮箱</label>
            <input type="email" id="inputEmail" placeholder="example@mail.com" />
          </div>
          <div class="form-group">
            <label for="inputPhone">电话</label>
            <input type="tel" id="inputPhone" placeholder="请输入电话号码" />
          </div>
        </div>
        <div class="form-error" id="formError"></div>
        <div class="form-actions">
          <button type="button" class="btn btn-ghost" id="cancelBtn">取消</button>
          <button type="submit" class="btn btn-primary" id="submitBtn">保存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Delete Confirm Modal -->
  <div id="deleteModal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-overlay" id="deleteOverlay"></div>
    <div class="modal-content modal-sm">
      <div class="modal-header">
        <h2>确认删除</h2>
        <button class="modal-close" id="deleteClose">&times;</button>
      </div>
      <p id="deleteMessage" class="delete-msg">确定要删除该学生的信息吗？此操作不可撤销。</p>
      <div class="form-actions">
        <button type="button" class="btn btn-ghost" id="deleteCancelBtn">取消</button>
        <button type="button" class="btn btn-danger" id="deleteConfirmBtn">确认删除</button>
      </div>
    </div>
  </div>

  <footer>
    <p>© 2024 学生信息管理系统 · 毕业设计作品 · String-xiaoming</p>
  </footer>

  <script src="/js/app.js"></script>
</body>
</html>
